services:
  api:
    build:
      context: ./api
      dockerfile: ../infra/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: sqlite:/data/budgettool.db?mode=rwc
      JWT_SECRET: ${JWT_SECRET}
      DATA_DIR: /data/files
    volumes:
      - api-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/Dockerfile.frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  api-data:
